<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIDELAB — Clinical Decision Support System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #E0DDD5;
        --ink-soft: #B8B5AC;
        --ink-dim: #9E9C95;
        --line: #3D3C39;
        --gold: #c9a84c;
        --green: #6b9e6b;
        --orange: #d49a4a;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        background: transparent;
        font-family: 'IBM Plex Mono', ui-monospace, monospace;
        color: var(--ink);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        overflow-y: auto;
        overflow-x: hidden;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        display: none;
        width: 0;
        height: 0;
      }

      .terminal {
        padding: 24px 10ch 8px 0;
        font-size: 12.5px;
        line-height: 1.7;
        letter-spacing: 0.01em;
      }

      /* All blocks hidden until typed */
      .t-block { visibility: hidden; }

      .t-header { margin-bottom: 24px; }
      .t-header .eyebrow {
        font-size: 10px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--ink-dim);
        margin-bottom: 6px;
      }
      .t-header .eyebrow .sep { color: var(--line); margin: 0 6px; }
      .t-header .title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--ink);
        margin-bottom: 3px;
      }
      .t-header .subtitle {
        font-size: 10.5px;
        letter-spacing: 0.06em;
        color: var(--ink-dim);
      }

      .t-label {
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        font-weight: 500;
        color: var(--gold);
        margin-top: 22px;
        margin-bottom: 8px;
      }

      .t-rag {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        font-size: 12px;
      }
      .t-rag .pair { display: flex; align-items: center; gap: 6px; }
      .t-rag .key { color: var(--ink-dim); }
      .t-rag .val { color: var(--ink); }
      .t-rag .dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--green); flex-shrink: 0;
      }
      .t-rag .badge { color: var(--green); font-weight: 500; }

      .t-note {
        font-size: 11.5px;
        color: var(--ink-dim);
        font-style: italic;
        line-height: 1.65;
      }

      .t-input-section { margin-top: 22px; margin-bottom: 18px; }
      .t-input-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        color: var(--gold);
        margin-bottom: 6px;
      }
      .t-input-text {
        font-size: 12.5px;
        color: var(--ink);
        line-height: 1.75;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .t-steps { margin: 18px 0; }
      .t-step {
        font-size: 12px;
        color: var(--ink-soft);
        margin-bottom: 5px;
      }
      .t-step .check { color: var(--green); margin-right: 6px; }

      .t-case {
        font-size: 12px;
        color: var(--ink-soft);
        line-height: 1.7;
        margin: 16px 0;
        padding-left: 12px;
        border-left: 2px solid rgba(138, 115, 48, 0.25);
      }

      .t-chain { margin-bottom: 14px; }
      .t-chain .chain-name {
        font-size: 12.5px;
        font-weight: 600;
        color: var(--ink);
        margin-bottom: 3px;
      }
      .t-chain .chain-sx {
        font-size: 11.5px;
        color: var(--ink-soft);
        padding-left: 14px;
      }
      .t-chain .chain-sx .arrow { color: var(--ink-dim); margin-right: 4px; }
      .t-chain .chain-px {
        font-size: 11px;
        color: var(--gold);
        padding-left: 14px;
        margin-top: 2px;
      }

      .t-klar { list-style: none; counter-reset: klar; }
      .t-klar li {
        counter-increment: klar;
        font-size: 11.5px;
        color: var(--ink-soft);
        line-height: 1.65;
        margin-bottom: 6px;
        padding-left: 20px;
        position: relative;
      }
      .t-klar li::before {
        content: counter(klar) '.';
        position: absolute;
        left: 0;
        color: var(--ink-dim);
        font-weight: 500;
      }

      .t-dx { margin-top: 22px; }
      .t-dx .dx-status {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }
      .t-dx .dx-dot {
        width: 8px; height: 8px; border-radius: 50%;
        border: 2px solid var(--orange); flex-shrink: 0;
      }
      .t-dx .dx-label {
        font-size: 11px;
        font-weight: 500;
        color: var(--orange);
        letter-spacing: 0.04em;
      }
      .t-dx .dx-text {
        font-size: 12px;
        color: var(--ink-soft);
        line-height: 1.65;
      }

      .t-footer {
        margin-top: 24px;
        padding-top: 14px;
        font-size: 10.5px;
        color: var(--ink-dim);
        letter-spacing: 0.04em;
      }
      .t-footer .help-key { color: var(--gold); font-weight: 600; }

      /* Typing cursor */
      .t-cursor {
        display: inline-block;
        width: 7px;
        height: 1em;
        background: var(--gold);
        margin-left: 2px;
        vertical-align: text-bottom;
        animation: blink 1.05s steps(2, end) infinite;
      }
      @keyframes blink {
        0%, 49% { opacity: 1; }
        50%, 100% { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div class="terminal" id="terminal">
      <div class="t-header">
        <div class="eyebrow t-block" data-text="SIDELAB · Clinical Intelligence · Sentra SideLab Project"></div>
      </div>

      <div class="t-input-label t-block" data-text="INPUT DOKTER >"></div>
      <div class="t-input-text t-block" data-text="1 pasien usia 30 tahun datang dengan nyeri pada panggul kanan yang menjalar hingga lutut. Nyeri dirasakan terus menerus. Nyeri sejak 1 hari yang lalu. BAK :Dysuria (-) Deman (-), Batuk (-) sesak (-) mual (-) muntah (-). Riw. Dm (-) riw. Ht (-) riw. Trauma (-)"></div>

      <div class="t-steps">
        <div class="t-step t-block" data-text="✓ Menganalisis keluhan…"></div>
        <div class="t-step t-block" data-text="✓ Clinical chains aktif: Batuk, Mual"></div>
        <div class="t-step t-block" data-text="✓ Mengambil referensi klinis (RAG)…"></div>
        <div class="t-step t-block" data-text="✓ Memproses dengan Sentra Voss 1.7 — mohon tunggu…"></div>
      </div>

      <div class="t-case t-block" data-text="Pasien usia 30 tahun dengan nyeri panggul kanan menjalar ke lutut sejak 1 hari, tanpa disuria, demam, riwayat trauma."></div>

      <div class="t-label t-block" data-text="Clinical Chains"></div>
      <div class="t-chain">
        <div class="chain-name t-block" data-text="Batuk"></div>
        <div class="chain-sx t-block" data-text="→ Demam, Sesak napas, Nyeri dada, Rhinorhea atau pilek"></div>
        <div class="chain-px t-block" data-text="Px: Auskultasi Pulmo, Inspeksi Faring"></div>
      </div>
      <div class="t-chain">
        <div class="chain-name t-block" data-text="Mual"></div>
        <div class="chain-sx t-block" data-text="→ Muntah, Anoreksia, Pusing, Keringat dingin"></div>
        <div class="chain-px t-block" data-text="Px: Palpasi Abdomen, Tanda Vital"></div>
      </div>

      <div class="t-label t-block" data-text="Klarifikasi"></div>
      <div class="t-klar">
        <li class="t-block" data-text="Karakter nyeri (tajam/tumpul/ seperti tertusuk)?"></li>
        <li class="t-block" data-text="Apakah nyeri bertambah saat batuk/bersin/mengejan?"></li>
        <li class="t-block" data-text="Apakah ada kelemahan otot atau mati rasa pada tungkai?"></li>
      </div>

      <div class="t-label t-block" data-text="Diagnosis Kerja"></div>
      <div class="t-dx">
        <div class="dx-status t-block" data-text="● DATA KURANG"></div>
        <div class="dx-text t-block" data-text="Low back pain (Lumbago) dengan radikulopati"></div>
      </div>

      <div class="t-footer t-block" data-text="ketik keluhan atau /help untuk daftar perintah"></div>
    </div>

    <script>
      (function () {
        var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var blocks = document.querySelectorAll('.t-block');
        var cursor = document.createElement('span');
        cursor.className = 't-cursor';

        if (reduce) {
          blocks.forEach(function (b) {
            b.style.visibility = 'visible';
            b.textContent = b.getAttribute('data-text');
          });
          return;
        }

        var idx = 0;

        function nextBlock() {
          if (idx >= blocks.length) {
            cursor.remove();
            return;
          }
          var block = blocks[idx];
          var fullText = block.getAttribute('data-text');
          block.style.visibility = 'visible';
          block.textContent = '';
          block.appendChild(cursor);
          var ci = 0;

          function typeChar() {
            if (ci < fullText.length) {
              cursor.insertAdjacentText('beforebegin', fullText[ci]);
              ci++;
              var speed = 20 + Math.random() * 15;
              if (fullText[ci - 1] === '.' || fullText[ci - 1] === '…') speed = 120;
              if (fullText[ci - 1] === ',') speed = 60;
              setTimeout(typeChar, speed);
            } else {
              cursor.remove();
              idx++;
              setTimeout(nextBlock, 180);
            }
          }
          typeChar();
        }

        setTimeout(nextBlock, 300);
      })();
    </script>
  </body>
</html>
